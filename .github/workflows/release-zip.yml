name: Create Release ZIP

on:
    push:
        tags: ['v*']
    release:
        types: [published]

permissions:
    contents: read

concurrency:
    group: release-zip-${{ github.ref }}
    cancel-in-progress: true

jobs:
    create-zip:
        runs-on: ubuntu-latest
        if: github.repository == 'firstelementjp/swift-csv'
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Create ZIP
              id: create_zip
              run: |
                  rm -rf release
                  mkdir -p release
                  ZIP_VERSION="${GITHUB_REF_NAME#v}"
                  ZIP_FILE="swift-csv-${ZIP_VERSION}.zip"

                  # Create release tree from git (respects .gitattributes export-ignore).
                  git archive --format=tar --prefix=swift-csv/ --worktree-attributes ${{ github.ref_name }} | tar -x -C release

                  # Copy built/minified assets from working directory into the release tree.
                  mkdir -p release/swift-csv/assets/js/export/swift-csv
                  mkdir -p release/swift-csv/assets/css
                  cp -f assets/js/*.min.js release/swift-csv/assets/js/ || true
                  cp -f assets/css/*.min.css release/swift-csv/assets/css/ || true
                  cp -f assets/js/export/swift-csv/*.min.js release/swift-csv/assets/js/export/swift-csv/ || true

                  cd release
                  rm -f ../${ZIP_FILE}
                  zip -r ../${ZIP_FILE} swift-csv

                  echo "zip_file=${ZIP_FILE}" >> "$GITHUB_OUTPUT"

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  files: ${{ steps.create_zip.outputs.zip_file }}
                  generate_release_notes: true
                  draft: false
                  prerelease: false
