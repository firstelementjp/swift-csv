name: Create Release ZIP

on:
    push:
        tags: ['v*']
    release:
        types: [published]

jobs:
    create-zip:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Create ZIP
              run: |
                  # Create release directory
                  mkdir release
                  git archive --format=tar --prefix=swift-csv/ ${{ github.ref_name }} | tar -x -C release

                  # Keep only necessary files
                  cd release/swift-csv

                  # Keep minified assets
                  find assets -name "*.min.js" -o -name "*.min.css" | head -20

                  # Remove development files
                  find assets -name "*.js" -not -name "*.min.js" -delete
                  find assets -name "*.css" -not -name "*.min.css" -delete

                  # Remove development directories
                  rm -rf node_modules vendor .github _deprecated

                  # Remove development files
                  rm -f package.json package-lock.json composer.json composer.lock
                  rm -f .gitignore .gitattributes .eslintrc.json .prettierrc phpcs.xml*
                  rm -f debug.php* .envrc*

                  # Remove documentation
                  rm -rf docs phpdoc
                  rm -f CONTRIBUTING.md

                  # Create final ZIP
                  cd ..
                  tar -czf swift-csv-${{ github.ref_name }}.tar.gz swift-csv

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  files: swift-csv-${{ github.ref_name }}.tar.gz
                  generate_release_notes: true
                  draft: false
                  prerelease: false
