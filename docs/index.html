<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Swift CSV Documentation</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Complete documentation for Swift CSV WordPress plugin - import/export functionality, configuration, troubleshooting, and developer guides."
		/>
		<meta
			name="keywords"
			content="WordPress, CSV, import, export, plugin, documentation, Swift CSV"
		/>
		<link
			rel="icon"
			type="image/png"
			href="https://github.com/firstelementjp/swift-csv/blob/main/assets/images/favicon.png?raw=true"
		/>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
		<style>
			:root {
				--theme-color: #0073aa;
				--theme-color-dark: #005f8d;
				--doc-border: #e5e7eb;
				--doc-surface: #f8fafc;
				--doc-text-muted: #475569;
			}

			body {
				text-rendering: optimizeLegibility;
			}

			.app-name-link img,
			.sidebar-nav img,
			.markdown-section img {
				border-radius: 12px;
			}

			.sidebar {
				border-right: 1px solid var(--doc-border);
			}

			.sidebar ul li a {
				font-size: 14px;
			}

			.markdown-section {
				max-width: 960px;
				padding-bottom: 64px;
			}

			.markdown-section blockquote {
				border-left: 4px solid var(--theme-color);
				background: var(--doc-surface);
				padding: 12px 16px;
				border-radius: 0 8px 8px 0;
				color: var(--doc-text-muted);
			}

			.markdown-section h1 + p img {
				box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
			}

			.markdown-section pre,
			.markdown-section code {
				border-radius: 8px;
			}

			.markdown-section pre {
				border: 1px solid var(--doc-border);
				box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
			}

			.markdown-section table {
				display: table;
				width: 100%;
				border-collapse: collapse;
			}

			.markdown-section table th,
			.markdown-section table td {
				border: 1px solid var(--doc-border);
				padding: 10px 12px;
			}

			.markdown-section table th {
				background: var(--doc-surface);
			}

			.markdown-section a.download-btn,
			.markdown-section p a[href*='/releases/download/'] {
				display: inline-block;
				background: var(--theme-color);
				color: #fff !important;
				padding: 10px 16px;
				border-radius: 8px;
				text-decoration: none;
				font-weight: 600;
				box-shadow: 0 8px 20px rgba(0, 115, 170, 0.24);
				transition:
					background 0.2s ease,
					transform 0.2s ease;
			}

			.markdown-section a.download-btn:hover,
			.markdown-section p a[href*='/releases/download/']:hover {
				background: var(--theme-color-dark);
				transform: translateY(-1px);
			}

			.lang-toggle {
				text-align: left;
				margin: 20px auto;
				padding: 0px 15px;
				width: 960px;
			}

			.lang-toggle a {
				display: inline-block;
				box-shadow: 0 8px 20px rgba(0, 115, 170, 0.24);
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<script>
			window.$docsify = {
				name: '📊 Swift CSV',
				repo: 'firstelementjp/swift-csv',
				loadSidebar: true,
				maxLevel: 4,
				subMaxLevel: 2,
				search: 'auto',
				alias: {
					'/ja/_sidebar.md': '/ja/_sidebar.md',
					'/ja/(.*)/_sidebar.md': '/ja/_sidebar.md',
					'/ja/.*/_sidebar.md': '/ja/_sidebar.md',
					'/.*/_sidebar.md': '/_sidebar.md',
					'/': '/README.md',
					'/ja/': '/ja/README.md',
					'/ja/(.*)': '/ja/$1',
				},
				copyCode: {
					buttonText: 'Copy to clipboard',
					errorText: 'Failed to copy',
					successText: 'Copied',
				},
				pagination: {
					previousText: 'Previous',
					nextText: 'Next',
				},
				plugins: [
					function (hook, vm) {
						hook.doneEach(function () {
							// Add language toggle button
							const isJapanese = vm.route.path.startsWith('/ja/');
							const switchPath = isJapanese ? '#/' : '#/ja/';
							const langToggle = `
								<div class="lang-toggle" style="text-align: right; margin: 20px auto;">
									<a href="${switchPath}" style="
										background: var(--theme-color);
										color: white;
										padding: 6px 12px;
										border-radius: 4px;
										text-decoration: none;
										font-size: 14px;
									">
										${isJapanese ? 'English' : '日本語'}
									</a>
								</div>
							`;

							// Remove existing toggle if present
							const existing = document.querySelector('.lang-toggle');
							if (existing) {
								existing.remove();
							}

							// Add new toggle
							const content = document.querySelector('.content');
							if (content && !content.querySelector('.lang-toggle')) {
								content.insertAdjacentHTML('afterbegin', langToggle);
							}

							// Add custom styling for code blocks
							document.querySelectorAll('pre[data-lang]').forEach(function (block) {
								if (!block.classList.contains('enhanced')) {
									block.classList.add('enhanced');
								}
							});
						});
					},
				],
			};
		</script>
		<script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
		<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/clipboard.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/pagination.min.js"></script>
	</body>
</html>
