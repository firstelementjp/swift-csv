name: Create Release ZIP

on:
    push:
        tags: ['v*']
    release:
        types: [published]

permissions:
    contents: read

concurrency:
    group: release-zip-${{ github.ref }}
    cancel-in-progress: true

jobs:
    create-zip:
        runs-on: ubuntu-latest
        if: github.repository == 'firstelementjp/fe-csv-import-export'
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Create ZIP
              id: create_zip
              run: |
                  rm -rf release
                  mkdir -p release
                  ZIP_VERSION="${GITHUB_REF_NAME#v}"
                  ZIP_FILE="fe-csv-import-export-${ZIP_VERSION}.zip"

                  # Create release tree from git (respects .gitattributes export-ignore).
                  git archive --format=tar --prefix=fe-csv-import-export/ --worktree-attributes ${{ github.ref_name }} | tar -x -C release

                  # Copy built/minified assets from working directory into the release tree.
                  mkdir -p release/fe-csv-import-export/assets/js
                  mkdir -p release/fe-csv-import-export/assets/css
                  cp -f assets/js/fe-csv-import-export-admin.min.js release/fe-csv-import-export/assets/js/ || true
                  cp -f assets/css/*.min.css release/fe-csv-import-export/assets/css/ || true

                  cd release
                  rm -f ../${ZIP_FILE}
                  zip -r ../${ZIP_FILE} fe-csv-import-export

                  echo "zip_file=${ZIP_FILE}" >> "$GITHUB_OUTPUT"

            - name: Security checks on release tree
              run: |
                  echo "=== Security checks in release tree ==="
                  echo "Files starting with underscore (should be 0):"
                  UNDERSCORE_COUNT=$(find release/fe-csv-import-export -name "_*" | wc -l)
                  echo "$UNDERSCORE_COUNT"
                  if [ "$UNDERSCORE_COUNT" -gt 0 ]; then
                      echo "ERROR: Found files starting with underscore:"
                      find release/fe-csv-import-export -name "_*"
                      exit 1
                  fi

                  echo "Files starting with dot (should be 0):"
                  DOT_COUNT=$(find release/fe-csv-import-export -name ".*" | wc -l)
                  echo "$DOT_COUNT"
                  if [ "$DOT_COUNT" -gt 0 ]; then
                      echo "ERROR: Found files starting with dot:"
                      find release/fe-csv-import-export -name ".*"
                      exit 1
                  fi

            - name: Create Release
              uses: softprops/action-gh-release@v3
              with:
                  files: ${{ steps.create_zip.outputs.zip_file }}
                  generate_release_notes: true
                  draft: false
                  prerelease: false
