version: 2
updates:
    # Composer dependencies
    - package-ecosystem: 'composer'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
      open-pull-requests-limit: 5
      reviewers:
          - 'dxd5001'
      assignees:
          - 'dxd5001'
      commit-message:
          prefix: 'deps'
          include: 'scope'

    # GitHub Actions (if added later)
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
      open-pull-requests-limit: 3
